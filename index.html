*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}

body{padding:env(safe-area-inset-top) 8px calc(env(safe-area-inset-bottom) + 4px);display:flex;justify-content:center}
#app{width:min(100vw,500px);height:100dvh;display:flex;flex-direction:column;gap:4px}
header{display:grid;grid-template-columns:58px 46px 1fr 36px;gap:6px;align-items:center;padding-top:3px}
button,select{color:var(--text);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:5px 4px;font-size:10px;font-weight:800;min-height:28px}

#subdivTop{min-width:36px;text-align:center;color:var(--accent2);background:rgba(0,224,164,.11);border:1px solid rgba(0,224,164,.25);border-radius:8px;padding:5px 6px;font-size:12px;font-weight:900}
.settingsWrap{position:relative}#settingsBtn{min-width:34px;padding:6px;font-size:17px;line-height:1}#settingsMenu{display:none;position:absolute;right:0;top:40px;width:180px;transform:none;padding:8px;gap:6px;grid-template-columns:1fr;background:rgba(16,19,28,.98);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.45);z-index:40}#settingsMenu.open{display:grid}

.timelineHeader{height:32px;display:grid;grid-template-columns:1fr 1fr 64px 64px;align-items:center;gap:6px;padding:4px 6px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.025)}
.trackSelect,.soundSelect,.colorSelect{min-width:0;height:24px;padding:0 6px;border-radius:8px;font-size:11px}.miniBtn{min-height:24px;height:24px;padding:0 7px;border-radius:8px;font-size:10px}

.pianoKey{position:absolute;left:0;width:38px;border-right:1px solid var(--line);border-bottom:1px solid rgba(255,255,255,.045);font-size:7px;color:var(--muted);padding:1px 3px;z-index:5;background:rgba(6,7,11,.95)}.pianoKey.black{color:rgba(255,255,255,.38);background:rgba(0,0,0,.92)}.vZoomStrip{position:absolute;left:0;top:0;width:38px;bottom:0;z-index:12;pointer-events:auto;background:transparent;touch-action:none}.vZoomThumb{display:none}
.pianoRow{position:absolute;left:38px;right:0;border-bottom:1px solid rgba(255,255,255,.035)}.pianoRow.white{background:rgba(255,255,255,.075)}.pianoRow.black{background:rgba(255,255,255,.03)}

</head>

function normalizeSoundFontUrl(url){
 let u=String(url||"").trim();
 const m=u.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^#?]+)/i);

async function waitForFluidSynthWrapper(){
 // js-synthesizer can appear before the wasm wrapper is truly ready on mobile Safari.
 for(let i=0;i<120;i++){
  if(window.JSSynth && typeof window.JSSynth.waitForReady==="function"){
   try{
    await window.JSSynth.waitForReady();
    return true;
   }catch(e){}
  }
  if(window.Module && typeof window.Module.cwrap==="function")return true;
  await new Promise(r=>setTimeout(r,50));
 }
 return false;
}

async function ensureRealSoundFont(){
 ensureAudio();
 if(state.sfSynth||state.sfLoading)return;
 state.sfLoading=true;
 setSfStatus("Starting SF2 engine...");
 try{
  if(!window.JSSynth)throw new Error("js-synthesizer unavailable");
  const ready=await waitForFluidSynthWrapper();
  if(!ready)throw new Error("FluidSynth wrapper not ready");
  const synth=new window.JSSynth.Synthesizer();
  synth.init(state.audioCtx.sampleRate,{initialGain:.7,midiChannelCount:16});
  let node=null,lastErr=null;
  for(const b of [512,1024,256,128]){
   try{
    node=synth.createAudioNode(state.audioCtx,b);
    break;
   }catch(e){lastErr=e}
  }
  if(!node)throw lastErr||new Error("audio node failed");
  node.connect(state.audioCtx.destination);
  state.sfSynth=synth;
  state.sfNode=node;
 }catch(err){
  state.sfSynth=null;
  state.sfNode=null;
  state.sfReady=false;
  const msg=(err&&err.message)?err.message:String(err);
  setSfStatus("SF2 unavailable: "+msg);
  throw err;
 }finally{
  state.sfLoading=false;
 }
}

async function loadDefaultSoundFont(){
 if(state.sfLoading)return false;
 try{
  setSfStatus("Loading SC-55 SF2...");
  await ensureRealSoundFont();
  if(state.sfId!=null){try{state.sfSynth.unloadSFont(state.sfId)}catch{}}
  const res=await fetch(normalizeSoundFontUrl(DEFAULT_SF2_URL),{cache:"force-cache"});
  if(!res.ok)throw new Error("SF2 fetch failed");
  const buf=await res.arrayBuffer();
  state.sfId=await state.sfSynth.loadSFont(buf);
  state.sfReady=true;
  state.sfProgramCache={};
  setProgramsForAllTracks();
  el.sfLoadBtn.textContent="SC-55 Loaded";
  setSfStatus("SC-55 loaded");
  render();
  return true;
 }catch(err){
  state.sfReady=false;
  el.sfLoadBtn.textContent="Retry SC-55 SF2";
  const msg=(err&&err.message)?err.message:String(err);
  setSfStatus("Using fallback sounds. "+msg);
  render();
  return false;
 }
}

function setTrackProgram(track){
 if(!state.sfReady||!state.sfSynth||!track.sound||!track.sound.startsWith("gm:"))return;

 for(let ch=0;ch<6;ch++){
  const key=track.id+":"+ch+":"+prog;
  if(state.sfProgramCache[key])continue;
  try{state.sfSynth.programSelect(ch,state.sfId,0,prog)}catch(e){try{state.sfSynth.programChange(ch,prog)}catch{}}
  state.sfProgramCache[key]=true;
 }
}

  }catch(e){}
  try{
   if(typeof state.sfSynth.midiNoteOn==="function")state.sfSynth.midiNoteOn(ch,m,vel);

  }catch(e){}
 };
 if(delayMs<=1)on();
 else setTimeout(on,delayMs);
 setTimeout(off,delayMs+durMs);

}

function gmProgram(sound){

function internalSoundForTrack(tr){

    const tickHit=(n.start+n.duration)>=minTick&&n.start<=maxTick;
    const midiHit=n.midi>=minMidi&&n.midi<=maxMidi;
    if(tickHit&&midiHit)state.selectedIds.add(n.id);
   }
  }
 }

 el.timelineViewport.addEventListener("pointerdown",e=>{
  if(e.target.closest(".note")||e.target.closest(".vZoomStrip"))return;
  e.preventDefault();
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  try{el.timelineViewport.setPointerCapture(e.pointerId)}catch{}

  if(pointers.size===1){
   mode="pan";
   lastX=downX=e.clientX;
   lastY=downY=e.clientY;
   downTime=performance.now();
   selectStart={x:e.clientX,y:e.clientY};
   clearTimeout(selectTimer);
   selectTimer=setTimeout(()=>{
    if(pointers.size===1&&mode==="pan"){
     mode="box";
     makeSelectBox();
     updateSelectBox(e.clientX,e.clientY);
    }
   },320);
  }

  if(pointers.size===2){
   clearTimeout(selectTimer);
   clearSelectBox();
   mode="pinch";
   const p=[...pointers.values()];
   pinch={dist:distance(p[0],p[1]),zoom:state.zoom,rowH,scrollX:state.scrollX,scrollY:state.scrollY,mid:midpoint(p[0],p[1])};
  }
 },{passive:false});

 el.timelineViewport.addEventListener("pointermove",e=>{
  if(!pointers.has(e.pointerId))return;
  e.preventDefault();
  const prev=pointers.get(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});

  if(mode==="box"){
   updateSelectBox(e.clientX,e.clientY);
   return;
  }

  if(mode==="pinch"&&pointers.size>=2&&pinch){
   const p=[...pointers.values()].slice(0,2);
   const scale=Math.max(20,distance(p[0],p[1]))/Math.max(20,pinch.dist);
   const m=midpoint(p[0],p[1]);
   const rect=el.timelineViewport.getBoundingClientRect();
   state.zoom=Math.max(.3,Math.min(5.5,pinch.zoom*scale));
   rowH=Math.max(6,Math.min(28,pinch.rowH*scale));
   const cx=pinch.mid.x-rect.left,cy=pinch.mid.y-rect.top,nx=m.x-rect.left,ny=m.y-rect.top;
   state.scrollX=Math.max(0,(pinch.scrollX+cx-38)*(state.zoom/pinch.zoom)-(nx-38));
   state.scrollY=Math.max(0,Math.min(900,(pinch.scrollY+cy)*(rowH/pinch.rowH)-ny));
   render();
   return;
  }

  if(mode==="pan"&&pointers.size===1){
   const dx=e.clientX-lastX;
   const dy=e.clientY-lastY;
   if(Math.abs(e.clientX-downX)>8||Math.abs(e.clientY-downY)>8)clearTimeout(selectTimer);
   state.scrollX=Math.max(0,state.scrollX-dx);
   state.scrollY=Math.max(0,Math.min(900,state.scrollY-dy));
   lastX=e.clientX;
   lastY=e.clientY;
   render();
  }
 },{passive:false});

 function endPointer(e){
  if(!pointers.has(e.pointerId))return;
  const wasMode=mode;
  pointers.delete(e.pointerId);
  clearTimeout(selectTimer);

  if(wasMode==="box"){
   finishBoxSelect(e.clientX,e.clientY);
   clearSelectBox();
   mode="idle";
   render();
   return;
  }

  if(wasMode==="pan"){
   const moved=Math.abs(e.clientX-downX)>8||Math.abs(e.clientY-downY)>8;
   if(!moved&&performance.now()-downTime<300){
    if(state.chordMode){render();return;}
    const rect=el.timelineViewport.getBoundingClientRect();
    state.tick=xToTick(e.clientX-rect.left);
    state.selectedIds.clear();
    render();
   }
  }

  if(pointers.size===0){
   mode="idle";
   pinch=null;
  }else if(pointers.size===1){
   const p=[...pointers.values()][0];
   mode="pan";
   lastX=downX=p.x;
   lastY=downY=p.y;
   pinch=null;
  }
 }

  e.preventDefault();
  if(e.ctrlKey)zoomH(e.deltaY<0?1.08:.92);
  else{
   state.scrollX=Math.max(0,state.scrollX+e.deltaX);
   state.scrollY=Math.max(0,Math.min(900,state.scrollY+e.deltaY));
   render();
  }
 },{passive:false});
}
function setupVZoomStrip(){
 if(!el.vZoomStrip)return;
 let startY=0,startRowH=rowH,dragging=false;
 el.vZoomStrip.addEventListener("pointerdown",e=>{
  e.preventDefault();
  e.stopPropagation();
  dragging=true;
  startY=e.clientY;
  startRowH=rowH;
  try{el.vZoomStrip.setPointerCapture(e.pointerId)}catch{}
 });
 el.vZoomStrip.addEventListener("pointermove",e=>{
  if(!dragging)return;
  e.preventDefault();
  e.stopPropagation();
  const dy=e.clientY-startY;
  // Drag up = zoom in vertically, drag down = zoom out.
  rowH=Math.max(2.2,Math.min(32,startRowH-dy*0.09));
  render();
 });

 el.vZoomStrip.addEventListener("pointercancel",()=>{dragging=false});
 el.vZoomStrip.addEventListener("wheel",e=>{
  e.preventDefault();
  e.stopPropagation();
  rowH=Math.max(2.2,Math.min(32,rowH*(e.deltaY<0?1.15:.78)));

}

function delSel(){if(!state.selectedIds.size)return;pushUndo();for(const t of state.tracks)t.notes=t.notes.filter(n=>!state.selectedIds.has(n.id));state.selectedIds.clear();render()}
function writeStr(a,s){for(let i=0;i<s.length;i++)a.push(s.charCodeAt(i))}function write32(a,n){a.push((n>>24)&255,(n>>16)&255,(n>>8)&255,n&255)}function write16(a,n){a.push((n>>8)&255,n&255)}function varLen(n){let b=n&127,o=[];while(n>>=7){b<<=8;b|=(n&127)|128}while(true){o.push(b&255);if(b&128)b>>=8;else break}return o}
function makeMidiFile(){const file=[];writeStr(file,"MThd");write32(file,6);write16(file,1);write16(file,state.tracks.length);write16(file,PPQ);for(let ti=0;ti<state.tracks.length;ti++){const tr=state.tracks[ti],events=[];for(const n of tr.notes){const ch=Math.max(0,Math.min(15,(n.channel||1)-1));events.push({tick:Math.round(n.start),type:"on",midi:n.midi,vel:92,ch});events.push({tick:Math.round(n.start+n.duration),type:"off",midi:n.midi,vel:0,ch})}events.sort((a,b)=>a.tick-b.tick||(a.type==="off"?-1:1));const data=[];let last=0;if(ti===0){const mpqn=Math.round(60000000/state.tempo);data.push(...varLen(0),255,81,3,(mpqn>>16)&255,(mpqn>>8)&255,mpqn&255)}data.push(...varLen(0),255,3,tr.name.length);writeStr(data,tr.name);for(let ch=0;ch<6;ch++){data.push(...varLen(0),192|ch,gmProgram(tr.sound))}for(const ev of events){data.push(...varLen(ev.tick-last));last=ev.tick;data.push((ev.type==="on"?144:128)|ev.ch,ev.midi,ev.vel)}data.push(...varLen(0),255,47,0);writeStr(file,"MTrk");write32(file,data.length);file.push(...data)}return file}
function exportMidi(){const blob=new Blob([new Uint8Array(makeMidiFile())],{type:"audio/midi"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="fretstep.mid";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}

function projectData(){
 return {
  version:11,tempo:state.tempo,timeSigNum:state.timeSigNum,timeSigDen:state.timeSigDen,metronome:state.metronome,semitoneMode:state.semitoneMode,subdivision:state.subdivision,metronome:state.metronome,inputOctave:state.inputOctave,
  tracks:state.tracks,activeTrackId:state.activeTrackId,viewAllTracks:state.viewAllTracks,
  hideFretboard:state.hideFretboard,useSoundFont:state.useSoundFont,
  loopEnabled:state.loopEnabled,loopStart:state.loopStart,loopEnd:state.loopEnd,
  nextNoteId:state.nextNoteId,zoom:state.zoom,rowH
 };
}
function applyProjectData(d){
 state.tempo=d.tempo||120;state.timeSigNum=d.timeSigNum||4;state.timeSigDen=d.timeSigDen||4;state.subdivision=d.subdivision||16;state.metronome=!!d.metronome;state.inputOctave=d.inputOctave||0;
 state.tracks=d.tracks||state.tracks;state.activeTrackId=d.activeTrackId||state.tracks[0].id;
 state.viewAllTracks=!!d.viewAllTracks;state.hideFretboard=!!d.hideFretboard;state.useSoundFont=d.useSoundFont!==false;
 state.loopEnabled=!!d.loopEnabled;state.loopStart=d.loopStart||0;state.loopEnd=d.loopEnd||PPQ*4;state.nextNoteId=d.nextNoteId||1;
 if(d.zoom)state.zoom=d.zoom;if(d.rowH)rowH=d.rowH;state.selectedIds.clear();el.tempo.value=state.tempo;el.tempoSlider.value=state.tempo;render();
}
function exportProject(){
 const blob=new Blob([JSON.stringify(projectData(),null,2)],{type:"application/json"});
 const url=URL.createObjectURL(blob),a=document.createElement("a");
 a.href=url;a.download="fretstep-project.fretstep";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}

function askNewProject(){
 const choice=prompt('New project. Type "save" to save current first, "new" to start without saving, or cancel.');
 if(choice===null)return;

function localProjects(){
 try{return JSON.parse(localStorage.getItem("fretstep-projects-v21")||"[]")}catch{return[]}
}
function writeLocalProjects(list){
 localStorage.setItem("fretstep-projects-v21",JSON.stringify(list));
}
function renderLocalProjects(){
 const list=localProjects().sort((a,b)=>(b.updated||0)-(a.updated||0));
 el.localProjectsList.innerHTML="";
 if(!list.length){
  const empty=document.createElement("div");
  empty.style.cssText="font-size:12px;color:var(--muted);padding:8px;";
  empty.textContent="No local projects yet.";
  el.localProjectsList.appendChild(empty);
  return;
 }
 for(const item of list){
  const row=document.createElement("div");
  row.className="projectRow";
  const name=document.createElement("div");
  name.style.cssText="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;";
  name.textContent=item.name||"Untitled";

  const load=document.createElement("button");
  load.textContent="Load";
  load.style.minHeight="26px";
  load.onclick=()=>{pushUndo();applyProjectData(item.data);el.projectNameInput.value=item.name||"Untitled";el.localProjectsMenu.classList.remove("open")};

  const rename=document.createElement("button");
  rename.textContent="Rename";
  rename.style.minHeight="26px";
  rename.onclick=()=>{
   const next=prompt("Rename project:", item.name||"Untitled");
   if(next===null)return;
   const clean=next.trim()||"Untitled";
   const all=localProjects();
   const target=all.find(p=>p.id===item.id);
   if(target){target.name=clean;target.updated=Date.now();writeLocalProjects(all);renderLocalProjects();el.projectNameInput.value=clean}
  };

  const del=document.createElement("button");
  del.textContent="Del";
  del.style.minHeight="26px";
  del.onclick=()=>{if(confirm("Delete local project?")){writeLocalProjects(localProjects().filter(p=>p.id!==item.id));renderLocalProjects()}};

  row.appendChild(name);row.appendChild(load);row.appendChild(rename);row.appendChild(del);
  el.localProjectsList.appendChild(row);
 }
}
function saveProject(){
 let name=(el.projectNameInput.value||"").trim();
 if(!name||name==="Untitled"){
  const asked=prompt("Project name:", name||"Untitled");
  if(asked===null)return;
  name=(asked.trim()||"Untitled");
  el.projectNameInput.value=name;
 }
 const list=localProjects();
 const existing=list.find(p=>p.name===name);
 const data=projectData();
 if(existing){
  existing.data=data;
  existing.updated=Date.now();
 }else{
  list.push({id:String(Date.now())+"-"+Math.random().toString(36).slice(2),name,data,updated:Date.now()});
 }
 writeLocalProjects(list);
 renderLocalProjects();
 el.localProjectsMenu.classList.add("open");
 alert("Saved local project: "+name);
}

}
