function fretCandidatesForMidi(midi){
 const exact=[];
 const pitchClass=[];
 for(const s of strings){
  const exactFret=midi-s.midi;
  if(exactFret>=0&&exactFret<=12)exact.push({stringName:s.name,fret:exactFret,exact:true});
  for(let f=0;f<=12;f++){
   if(mod12(s.midi+f)===mod12(midi))pitchClass.push({stringName:s.name,fret:f,exact:false});
  }
 }
 exact.sort((a,b)=>a.fret-b.fret);
 pitchClass.sort((a,b)=>Math.abs(a.fret-5)-Math.abs(b.fret-5)||a.fret-b.fret);
 return [...exact,...pitchClass];
}
function mapNotesToFretLights(items){

 const used=new Set();
 for(const item of items){
  let chosen=null;
  if(item.stringName&&item.fret!=null){
   const key=item.stringName+":"+item.fret;
   if((perString[item.stringName]||0)<2&&!used.has(key))chosen={stringName:item.stringName,fret:item.fret};
  }
  if(!chosen){
   for(const candidate of fretCandidatesForMidi(item.midi)){
    const key=candidate.stringName+":"+candidate.fret;
    if((perString[candidate.stringName]||0)>=2||used.has(key))continue;
    chosen=candidate;
    break;
   }
  }
  if(!chosen)continue;
  const key=chosen.stringName+":"+chosen.fret;
  used.add(key);
  perString[chosen.stringName]=(perString[chosen.stringName]||0)+1;
  out.push({stringName:chosen.stringName,fret:chosen.fret,color:item.color||"yellow"});
 }
 return out;
}

function closeChoiceMenus(except=null){
 for(const menu of [el.voicerKeyMenu,el.voicerScaleMenu]){
  if(menu&&menu!==except)menu.classList.remove("open");
 }
}
function updateVoicerChoiceButtons(){
 state.voicer=normalizeVoicerSettings(state.voicer);
 if(el.voicerKeyBtn)el.voicerKeyBtn.textContent=choiceSummary(noteNames,state.voicer.keyMask,noteNames.length);
 if(el.voicerScaleBtn)el.voicerScaleBtn.textContent=choiceSummary(scaleDefs.map(s=>s[0]),state.voicer.scaleMask,scaleDefs.length);
}
function renderVoicerChoiceMenu(kind){
 const isKey=kind==="key";
 const menu=isKey?el.voicerKeyMenu:el.voicerScaleMenu;
 if(!menu)return;
 const labels=isKey?noteNames:scaleDefs.map(s=>s[0]);
 const maskProp=isKey?"keyMask":"scaleMask";
 const indexProp=isKey?"key":"scale";
 const count=labels.length;
 state.voicer=normalizeVoicerSettings(state.voicer);
 menu.innerHTML="";
 for(let i=0;i<count;i++){
  const label=document.createElement("label");
  const input=document.createElement("input");
  input.type="checkbox";
  input.checked=!!(state.voicer[maskProp]&(1<<i));
  input.onchange=()=>{
   let mask=boundedMask(state.voicer[maskProp],count,state.voicer[indexProp]);
   if(input.checked)mask|=1<<i;
   else mask&=~(1<<i);
   if(!mask){mask=1<<i;input.checked=true}
   pushUndo();
   state.voicer[maskProp]=boundedMask(mask,count,i);
   state.voicer[indexProp]=primaryMaskIndex(state.voicer[maskProp],count);
   updateVoicerChoiceButtons();
   resetVoicerEngine();
   renderStatus();
  };
  label.appendChild(input);
  label.appendChild(document.createTextNode(labels[i]));
  menu.appendChild(label);
 }
}
function toggleVoicerChoice(kind,e){
 e?.stopPropagation();
 const menu=kind==="key"?el.voicerKeyMenu:el.voicerScaleMenu;
 if(!menu)return;
 renderVoicerChoiceMenu(kind);
 const open=!menu.classList.contains("open");
 closeChoiceMenus(menu);
 menu.classList.toggle("open",open);
}
function controlNumber(control,fallback){
 const n=Number(control?.value);
 return Number.isFinite(n)?n:fallback;
}

function readVoicerControls(){
 if(currentPluginMode()==="groovizer"){
  const v=normalizeGroovizerSettings(state.groovizer);
  v.style=el.voicerStyle?.value||v.style;
  v.trigger=el.voicerRole?.value||v.trigger;
  v.phrase=el.voicerPlayability?.value||v.phrase;
  v.feel=el.voicerRakeMode?.value||v.feel;
  v.length=clamp(controlNumber(el.voicerChordSize,1),1,4);
  v.density=clamp(controlNumber(el.voicerRakeSpeed,.55),0,1);
  v.swing=clamp(controlNumber(el.voicerComplexity,.12),0,1);
  v.humanize=clamp(controlNumber(el.voicerVoiceLeading,.12),0,1);
  v.fill=clamp(controlNumber(el.voicerOutside,.25),0,1);
  v.variation=clamp(controlNumber(el.voicerVariation,.42),0,1);
  v.ghosts=clamp(controlNumber(el.voicerRepeat,.28),0,1);
  state.groovizer=normalizeGroovizerSettings(v);
  updateGroovizerValueLabels();
  return;
 }
 const v=normalizeVoicerSettings(state.voicer);
 v.style=el.voicerStyle?.value||v.style;
 v.role=el.voicerRole?.value||v.role;
 v.playability=el.voicerPlayability?.value||v.playability;
 v.rakeMode=el.voicerRakeMode?.value||v.rakeMode;
 v.chordSize=clamp(controlNumber(el.voicerChordSize,4),3,8);

 v.complexity=clamp(controlNumber(el.voicerComplexity,0),0,1);
 v.voiceLeading=clamp(controlNumber(el.voicerVoiceLeading,0),0,1);
 v.outside=clamp(controlNumber(el.voicerOutside,0),0,1);
 v.variation=clamp(controlNumber(el.voicerVariation,0),0,1);
 v.lengthVariety=clamp(controlNumber(el.voicerLengthVariety,.35),0,1);
 v.repeatChance=clamp(controlNumber(el.voicerRepeat,0),0,1);
 v.minNote=clamp(controlNumber(el.voicerMinNote,36),0,127);
 v.maxNote=clamp(controlNumber(el.voicerMaxNote,96),v.minNote,127);

function randomChoiceMask(count,primary){
 let mask=1<<primary;
 if(Math.random()<.32)mask|=1<<Math.floor(Math.random()*count);
 if(Math.random()<.14)mask|=1<<Math.floor(Math.random()*count);
 return boundedMask(mask,count,primary);
}
function randomizeVoicerSettings(){
 if(currentPluginMode()==="groovizer"){
  const v=state.groovizer;
  v.style=grooveStyleNames[Math.floor(Math.random()*grooveStyleNames.length)];
  v.trigger=grooveTriggerNames[Math.floor(Math.random()*grooveTriggerNames.length)];
  v.phrase=groovePhraseNames[Math.floor(Math.random()*groovePhraseNames.length)];
  v.feel=grooveFeelNames[Math.floor(Math.random()*grooveFeelNames.length)];
  v.length=1+Math.floor(Math.random()*4);
  v.density=.25+Math.random()*.75;
  v.swing=Math.random()*.65;
  v.humanize=Math.random()*.45;
  v.fill=Math.random();
  v.variation=Math.random();
  v.ghosts=Math.random();
  syncVoicerControls();
  resetGroovizerEngine();
  render();
  return;
 }
 const v=state.voicer;
 v.key=Math.floor(Math.random()*12);
 v.scale=Math.floor(Math.random()*scaleDefs.length);
 v.keyMask=randomChoiceMask(noteNames.length,v.key);
 v.scaleMask=randomChoiceMask(scaleDefs.length,v.scale);
 v.role=roleNames[Math.floor(Math.random()*roleNames.length)];
 v.style=voicingStyleNames[Math.floor(Math.random()*voicingStyleNames.length)];
 v.playability=playabilityNames[Math.floor(Math.random()*playabilityNames.length)];
 v.rakeMode=rakeModes[Math.floor(Math.random()*rakeModes.length)];
 v.chordSize=3+Math.floor(Math.random()*6);

 v.voiceLeading=.35+Math.random()*.65;
 v.outside=Math.random()*.75;
 v.variation=Math.random();
 v.lengthVariety=Math.random();

 v.rakeSpeed=Math.random()*.65;
 syncVoicerControls();
 resetVoicerEngine();
 render();

function ensureReadableInputZoom(){
 if(state.zoom<.85){
  state.zoom=.85;
  const viewportW=el.timelineViewport.clientWidth||300;
  const playX=38+(state.tick/stepTicks())*baseStepPx*state.zoom;
  state.scrollX=Math.max(0,playX-viewportW*.45);
 }
}
function isDrumTrack(t=activeTrack()){return state.useSoundFont&&trackSoundFont(t).type==="drum"}
function orderedDrumPadsForDisplay(pads){
 const bottom={kick:4,snare:4,clap:4,rim:4,pedalHat:3,closedHat:3,openHat:3,ride:3,crash:2,tomHigh:2,tomMid:2,tomLow:2,tamb:1,cowbell:1,clave:1,shaker:1,perc:0};
 return [...pads].sort((a,b)=>{
  const ra=bottom[drumRoleForPad(a)]??0,rb=bottom[drumRoleForPad(b)]??0;
  if(ra!==rb)return ra-rb;
  return (a.midi||0)-(b.midi||0);
 });
}
function addLivePadLights(midis,color="yellow",durationMs=450){
 const expires=Date.now()+durationMs;
 for(const midi of midis)state.livePadLights.push({midi:Number(midi),color,expires});
 if(state.livePadLights.length>80)state.livePadLights=state.livePadLights.slice(-80);
 updateFretboardStepLights();
}
function triggerDrumPadInput(pad,velocity=96){
 const tr=activeTrack(),midi=pad.midi,dur=stepTicks();
 if(state.voicerEnabled){
  insertGroovizerPhrase(pad,state.armed,velocity);
  render();
  return;
 }
 if(!state.armed){
  playNote(midi,dur,tr);
  addLivePadLights([midi],tr.color||"yellow",Math.max(360,Math.round(ticksToSeconds(dur)*1000)));
  render();
  return;
 }
 pushUndo();
 ensureReadableInputZoom();
 playNote(midi,dur,tr);
 tr.notes.push({id:state.nextNoteId++,trackId:tr.id,start:quantizedInputTick(),duration:dur,midi,displayMidi:midi,stringName:"",fret:null,channel:10,drumName:pad.label});
 addLivePadLights([midi],tr.color||"yellow",Math.max(360,Math.round(ticksToSeconds(dur)*1000)));
 if(!state.chordMode&&!state.playing)state.tick+=dur;
 render();
}
function addDrumNote(pad){triggerDrumPadInput(pad)}
function addNote(baseMidi,stringName,fret){
 const s=strings.find(x=>x.name===stringName),actual=baseMidi+state.inputOctave*12,tr=activeTrack();
 if(!state.armed){
  if(state.voicerEnabled)insertVoicerChord(baseMidi,stringName,fret,false);
  else playNote(actual,stepTicks(),tr);
  render();
  return;
 }
 pushUndo();
 ensureReadableInputZoom();
 if(state.voicerEnabled)insertVoicerChord(baseMidi,stringName,fret);
 else{
  playNote(actual,stepTicks(),tr);
  tr.notes.push({id:state.nextNoteId++,trackId:tr.id,start:quantizedInputTick(),duration:stepTicks(),midi:actual,displayMidi:baseMidi,stringName,fret,channel:s?s.channel:1});
  if(!state.chordMode&&!state.playing)state.tick+=stepTicks();
 }
 render();
}
function flashFret(stringName,fret){const node=[...document.querySelectorAll(".fret")].find(d=>d.dataset.string===stringName&&Number(d.dataset.fret)===fret);if(node){node.classList.add("flash");setTimeout(()=>node.classList.remove("flash"),130)}}
function flashDrumPad(midi){const node=el.fretboard.querySelector(`.drumPad[data-midi="${midi}"]`);if(node){node.classList.add("flash");setTimeout(()=>node.classList.remove("flash"),130)}}
function renderFretboard(){
 el.fretboard.innerHTML="";
 if(isDrumTrack()){
  el.fretboard.className="drumPadGrid";
  const def=trackSoundFont(activeTrack()),pads=orderedDrumPadsForDisplay(def.pads||gmDrumPads);
  for(const pad of pads){
   const c=document.createElement("div");
   c.className="drumPad";
   c.dataset.midi=pad.midi;
   c.textContent=pad.label;
   c.addEventListener("pointerdown",e=>{e.preventDefault();silentUnlock();if(!(state.voicerEnabled&&state.armed))flashDrumPad(pad.midi);addDrumNote(pad)});
   el.fretboard.appendChild(c);
  }
  el.fretMarkers.innerHTML="";
  return;
 }
 el.fretboard.className="";
 for(const s of strings)for(let f=0;f<=12;f++){const c=document.createElement("div");c.className="fret"+(f===0?" open":"");c.dataset.string=s.name;c.dataset.fret=f;c.addEventListener("pointerdown",e=>{e.preventDefault();silentUnlock();addNote(s.midi+f,s.name,f)});el.fretboard.appendChild(c)}
 el.fretMarkers.innerHTML="";for(let f=0;f<=12;f++){const c=document.createElement("div");c.className="markerCell";if([3,5,7,9,12].includes(f)){const m=document.createElement("div");m.className="marker";c.appendChild(m)}el.fretMarkers.appendChild(c)}
}
function lightFretPad(light,perString){
 if((perString[light.stringName]||0)>=2)return;
 const node=[...document.querySelectorAll(".fret")].find(d=>d.dataset.string===light.stringName&&Number(d.dataset.fret)===Number(light.fret));
 if(!node)return;
 perString[light.stringName]=(perString[light.stringName]||0)+1;
 node.style.setProperty("--fretLitColor",solidColors[light.color||"yellow"]||solidColors.yellow);
 node.classList.add("stepLit");
}
function queueFretLightsForNotes(notes,color="yellow",when=0,durationMs=450){
 const run=()=>addLiveFretLights(notes,color,durationMs);
 if(when>0.02)setTimeout(run,Math.max(0,when*1000));
 else run();
}
function queuePadLightsForNotes(midis,color="yellow",when=0,durationMs=450){
 const run=()=>addLivePadLights(midis.map(n=>typeof n==="number"?n:n.midi),color,durationMs);
 if(when>0.02)setTimeout(run,Math.max(0,when*1000));
 else run();
}
function lightDrumPad(midi,color="yellow"){
 const node=el.fretboard.querySelector(`.drumPad[data-midi="${midi}"]`);
 if(!node)return;
 node.style.setProperty("--fretLitColor",solidColors[color]||solidColors.yellow);
 node.classList.add("stepLit");
}
function updateFretboardStepLights(){
 const t=Math.max(0,state.tick);
 document.querySelectorAll(".fret.stepLit,.drumPad.stepLit").forEach(n=>{n.classList.remove("stepLit");n.style.removeProperty("--fretLitColor")});
 if(isDrumTrack()){
  for(const tr of state.tracks)for(const n of tr.notes){
   if(!(t>=n.start&&t<n.start+n.duration))continue;
   if(trackSoundFont(tr).type==="drum")lightDrumPad(n.midi,tr.color||"yellow");
  }
  const now=Date.now();
  state.livePadLights=state.livePadLights.filter(light=>light.expires>now);
  for(const light of state.livePadLights)lightDrumPad(light.midi,light.color||"yellow");
  return;
 }
 const active=[];
 for(const tr of state.tracks)for(const n of tr.notes){
  if(!(t>=n.start&&t<n.start+n.duration))continue;
  active.push({midi:n.midi,stringName:n.stringName,fret:n.fret,color:tr.color||"blue"});
 }
 const perString={};
 for(const light of mapNotesToFretLights(active))lightFretPad(light,perString);
 const now=Date.now();
 state.liveFretLights=state.liveFretLights.filter(light=>light.expires>now);
 for(const light of state.liveFretLights)lightFretPad(light,perString);
}

function presetDisplayName(sound,track=activeTrack()){
 if(!sound)return "Sound";
 const def=trackSoundFont(track);
 if(Array.isArray(def.presets)){
  const p=def.presets.find(x=>x[0]===sound);
  if(p)return p[1];
 }
 if(sound.startsWith("drum:")){
  const p=(def.presets||[]).find(x=>x[0]===sound);
  return p?p[1]:"Drums "+sound.split(":")[1];
 }
 if(sound.startsWith("gm:")){
  const p=gmPresets.find(x=>"gm:"+x[0]===sound);
  return p?p[1].replace(/^SC-55\s+/,""):"Program "+gmProgram(sound);
 }
 const p=samplePresetFallbacks.find(x=>x[0]===sound);
 return p?p[1].replace(/^Internal\s+/,""):sound;
}
function trackDisplayName(t){
 return String(t.id)+" "+presetDisplayName(t.sound,t);
}
function trackVolume(t){
 return Math.max(0,Math.min(150,Number(t.volume ?? 100)));
}
function currentChordRegionName(){
 const regs=chordRegions();
 const tick=state.tick;
 for(const r of regs){
  if(tick>=r.start&&tick<r.end)return r.name;
 }
 return currentChordName();
}

  ["11",[0,4,7,10,2,5]],["m11",[0,3,7,10,2,5]],["maj9#11",[0,4,7,11,2,6]],
  ["9",[0,4,7,10,2]],["m9",[0,3,7,10,2]],["maj9",[0,4,7,11,2]],["7b9",[0,4,7,10,1]],["7#9",[0,4,7,10,3]],["7#11",[0,4,7,10,6]],["7b5",[0,4,6,10]],["7#5",[0,4,8,10]],["7sus4",[0,5,7,10]],
  ["6/9",[0,4,7,9,2]],["m6/9",[0,3,7,9,2]],["6",[0,4,7,9]],["m6",[0,3,7,9]],
  ["maj7",[0,4,7,11]],["mMaj7",[0,3,7,11]],["m7b5",[0,3,6,10]],["dim7",[0,3,6,9]],["m7",[0,3,7,10]],["7",[0,4,7,10]],

 function endPointer(e){
  if(!pointers.has(e.pointerId))return;
  const wasMode=mode;
  pointers.delete(e.pointerId);
  clearTimeout(selectTimer);

  if(wasMode==="box"){
   finishBoxSelect(e.clientX,e.clientY);
   clearSelectBox();
   mode="idle";
   render();

  }

  if(wasMode==="pan"){
   const moved=Math.abs(e.clientX-downX)>8||Math.abs(e.clientY-downY)>8;

    if(state.chordMode){render();return;}

    state.tick=xToTick(e.clientX-rect.left);
    state.selectedIds.clear();
    render();
   }
  }

  if(pointers.size===0){
   mode="idle";
   pinch=null;
  }else if(pointers.size===1){
   const p=[...pointers.values()][0];
   mode="pan";
   lastX=downX=p.x;
   lastY=downY=p.y;

  }

function stabilizeMobileHeight(){
 try{
  const vv=window.visualViewport;
  const h=Math.floor((vv&&vv.height)?vv.height:window.innerHeight||document.documentElement.clientHeight);
  document.documentElement.style.setProperty("--appH",h+"px");
  const app=document.getElementById("app");
  if(app){
   app.style.height="calc(var(--appH) - env(safe-area-inset-top) - 4px)";
   app.style.maxHeight=app.style.height;
   app.style.overflow="hidden";
  }
  renderVZoomThumb&&renderVZoomThumb();
  if(el.soundPickerMenu?.classList.contains("open"))updateSoundPickerBounds();
 }catch(e){}
}
function scheduleStabilize(){
 stabilizeMobileHeight();
 requestAnimationFrame(stabilizeMobileHeight);
 setTimeout(stabilizeMobileHeight,60);

}

function hzLabel(v){return v>=1000?(Math.round(v/100)/10)+"k":String(Math.round(v))}
function fxPct(v){return String(Math.round(clamp(Number(v)||0,0,1)*100))}
function syncTrackFxValueLabels(){
 if(!trackFxTarget)return;
 const fx=trackFx(trackFxTarget);
 if(el.fxLowCutValue)el.fxLowCutValue.textContent=hzLabel(Number(fx.lowCut)||20);
 if(el.fxHighCutValue)el.fxHighCutValue.textContent=hzLabel(Number(fx.highCut)||18000);
 if(el.fxReverbMixValue)el.fxReverbMixValue.textContent=fxPct(fx.reverbMix);
 if(el.fxReverbTimeValue)el.fxReverbTimeValue.textContent=Number(fx.reverbTime||1.2).toFixed(1);
 if(el.fxDelayMixValue)el.fxDelayMixValue.textContent=fxPct(fx.delayMix);
 if(el.fxDelayTimeValue)el.fxDelayTimeValue.textContent=Number(fx.delayTime||.25).toFixed(2);
 if(el.fxChorusValue)el.fxChorusValue.textContent=fxPct(fx.chorus);
 if(el.fxDriveValue)el.fxDriveValue.textContent=fxPct(fx.drive);
 if(el.fxCrushValue)el.fxCrushValue.textContent=fxPct(fx.crush);
 if(el.fxPhaserValue)el.fxPhaserValue.textContent=fxPct(fx.phaser);
 if(el.fxAirValue)el.fxAirValue.textContent=fxPct(fx.air);

function writeFxControls(track){
 const fx=trackFx(track);
 if(el.fxLowCut)el.fxLowCut.value=String(fx.lowCut);
 if(el.fxHighCut)el.fxHighCut.value=String(fx.highCut);
 if(el.fxReverbMix)el.fxReverbMix.value=String(fx.reverbMix);
 if(el.fxReverbTime)el.fxReverbTime.value=String(fx.reverbTime);
 if(el.fxReverbType)el.fxReverbType.value=fx.reverbType||"Room";
 if(el.fxDelayMix)el.fxDelayMix.value=String(fx.delayMix);
 if(el.fxDelayTime)el.fxDelayTime.value=String(fx.delayTime);
 if(el.fxChorus)el.fxChorus.value=String(fx.chorus);
 if(el.fxDrive)el.fxDrive.value=String(fx.drive);
 if(el.fxCrush)el.fxCrush.value=String(fx.crush);
 if(el.fxPhaser)el.fxPhaser.value=String(fx.phaser);

function markTrackFxEdit(){

function readTrackFxControls(){
 if(!trackFxTarget)return;
 const fx=trackFx(trackFxTarget);
 fx.lowCut=clamp(controlNumber(el.fxLowCut,20),20,8000);
 fx.highCut=clamp(controlNumber(el.fxHighCut,18000),Math.max(800,fx.lowCut+80),20000);
 fx.reverbMix=clamp(controlNumber(el.fxReverbMix,0),0,1);
 fx.reverbTime=clamp(controlNumber(el.fxReverbTime,1.2),.2,5);
 fx.reverbType=el.fxReverbType?.value||"Room";
 fx.delayMix=clamp(controlNumber(el.fxDelayMix,0),0,1);
 fx.delayTime=clamp(controlNumber(el.fxDelayTime,.25),.06,1.2);
 fx.chorus=clamp(controlNumber(el.fxChorus,0),0,1);
 fx.drive=clamp(controlNumber(el.fxDrive,0),0,1);
 fx.crush=clamp(controlNumber(el.fxCrush,0),0,1);
 fx.phaser=clamp(controlNumber(el.fxPhaser,0),0,1);
 fx.air=clamp(controlNumber(el.fxAir,0),0,1);
 fx.tremolo=clamp(controlNumber(el.fxTremolo,0),0,1);
 if(el.fxHighCut&&Number(el.fxHighCut.value)!==fx.highCut)el.fxHighCut.value=String(fx.highCut);
 updateTrackFxBus(trackFxTarget);
 syncTrackFxValueLabels();
}

function isLightColor(c){
 try{
  const ctx=document.createElement("canvas").getContext("2d");
  ctx.fillStyle=c;const v=ctx.fillStyle;let r=0,g=0,b=0;
  if(v[0]==="#"){r=parseInt(v.slice(1,3),16);g=parseInt(v.slice(3,5),16);b=parseInt(v.slice(5,7),16)}
  return (r*299+g*587+b*114)/1000>160;
 }catch{return false}
}
function applyTheme(vals){
 const root=document.documentElement;
 const names=["--bg","--panel","--panel2","--line","--text","--muted","--accent","--accent2","--chord"];
 for(let i=0;i<names.length;i++)root.style.setProperty(names[i],vals[i+1]);root.style.setProperty("color-scheme",isLightColor(vals[1])?"light":"dark");
}
function randomHex(){
 return "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
}
function randomTheme(mono=false){
 if(mono){
  const dark=Math.random()>.5;
  const base=dark?Math.floor(Math.random()*40):220+Math.floor(Math.random()*30);
  const bg=`rgb(${base},${base},${base})`;
  const panel=`rgb(${Math.max(0,Math.min(255,base+(dark?12:-12)))},${Math.max(0,Math.min(255,base+(dark?12:-12)))},${Math.max(0,Math.min(255,base+(dark?12:-12)))})`;
  const text=dark?"#f5f5f5":"#111111";
  applyTheme(["Random Mono",bg,panel,panel,dark?"#444":"#bbb",text,dark?"#aaa":"#666",text,dark?"#999":"#555",dark?"#ddd":"#333"]);
 }else{
  const bg=randomHex();const light=isLightColor(bg);applyTheme(["Random",bg,randomHex(),randomHex(),randomHex(),light?"#111111":"#f8f8ff",light?"#555555":"#b9b9c8",randomHex(),randomHex(),randomHex()]);
 }
}
